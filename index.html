<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Firebase</title>
<style>
body{
    font-family: Arial;
    max-width: 800px;
    margin: 20px auto;
    padding: 20px;
}
input, textarea, button{
    width:100%;
    padding:10px;
    margin:5px 0;
}
.relatorio{
    border:1px solid #ccc;
    padding:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<h2>Relatórios Diários</h2>

<input type="text" id="usuario" placeholder="Nome do usuário">

<textarea id="atividade" rows="4"
placeholder="Descreva a atividade"></textarea>

<button onclick="salvarRelatorio()">
Salvar Relatório
</button>

<hr>

<button onclick="listarRelatorios()">
Atualizar Lista
</button>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
orderBy,
query
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgjh18yMgxVc5UOKIqrx1-298VJjW_MIY",
  authDomain: "relatorios-diarios-8f7ff.firebaseapp.com",
  projectId: "relatorios-diarios-8f7ff",
  storageBucket: "relatorios-diarios-8f7ff.firebasestorage.app",
  messagingSenderId: "277237222622",
  appId: "1:277237222622:web:38d56f92ae3e3d69f8464f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarRelatorio = async () => {

    const usuario =
    document.getElementById("usuario").value;

    const atividade =
    document.getElementById("atividade").value;

    if(!usuario || !atividade){
        alert("Preencha todos os campos");
        return;
    }

    await addDoc(collection(db, "relatorios"), {
        usuario,
        atividade,
        data: new Date().toLocaleString("pt-BR")
    });

    alert("Relatório salvo!");

    document.getElementById("atividade").value = "";

    listarRelatorios();
};

window.listarRelatorios = async () => {

    const lista =
    document.getElementById("lista");

    lista.innerHTML = "";

    const q =
    query(collection(db, "relatorios"));

    const snapshot =
    await getDocs(q);

    snapshot.forEach((doc) => {

        const dados = doc.data();

        lista.innerHTML += `
        <div class="relatorio">
            <strong>${dados.usuario}</strong><br>
            ${dados.data}<br><br>
            ${dados.atividade}
        </div>
        `;
    });
};

listarRelatorios();

</script>

</body>
</html>
